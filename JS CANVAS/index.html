<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script defer src="script.js"></script>
    <title>Canvas</title>
  </head>
  <body class="w-full min-h-screen h-fit bg-gray-300">
    <section class="w-full h-full">
      <nav class="border w-full p-2 text-xl gap-5 flex font-bold bg-zinc-200">

        <button class="border px-3 py-1 rounded-lg bg-green-600 text-white transition duration-300 hover:-translate-y-1 active:translate-y-0 hover:bg-green-700" id="undoBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-undo-icon lucide-undo"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg></button>

        <button class="border px-3 py-1 rounded-lg bg-green-600 text-white transition duration-300 hover:-translate-y-1 active:translate-y-0 hover:bg-green-700" id="redoBtn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-redo-icon lucide-redo"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg></button>

        <input id="brushSize" type="range" min="1" max="50" value="3" />
        <p id="rangeNum" class="text-black text-2xl">3</p>

        <h1 class="ml-140 text-2xl text-green-600">Paint</h1>

      </nav>
      <div class="w-full h-full flex">
        <aside class="border bg-black0-200 w-40 h-141">
          <div
            class="w-full h-15 grid grid-cols-2 justify-start text-xl font-bold gap-1 p-1"
          >
            <button id="brushSlc" class="border select-none flex items-center justify-center py-2 rounded-lg bg-green-600 text-white transition duration-300 hover:-translate-y-1 active:translate-y-0 hover:bg-green-700/70">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-paintbrush-icon lucide-paintbrush"
              >
                <path d="m14.622 17.897-10.68-2.913" />
                <path
                  d="M18.376 2.622a1 1 0 1 1 3.002 3.002L17.36 9.643a.5.5 0 0 0 0 .707l.944.944a2.41 2.41 0 0 1 0 3.408l-.944.944a.5.5 0 0 1-.707 0L8.354 7.348a.5.5 0 0 1 0-.707l.944-.944a2.41 2.41 0 0 1 3.408 0l.944.944a.5.5 0 0 0 .707 0z"
                />
                <path
                  d="M9 8c-1.804 2.71-3.97 3.46-6.583 3.948a.507.507 0 0 0-.302.819l7.32 8.883a1 1 0 0 0 1.185.204C12.735 20.405 16 16.792 16 15"
                />
              </svg>
            </button>

            <button id="pencilBtn" class="border select-none flex items-center justify-center py-2 rounded-lg bg-green-600 text-white transition duration-300 hover:-translate-y-1 active:translate-y-0 hover:bg-green-700/70">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-pencil-icon lucide-pencil"
              >
                <path
                  d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"
                />
                <path d="m15 5 4 4" />
              </svg>
            </button>

            <button id="eraserBtn" class="border select-none flex items-center justify-center py-2 rounded-lg bg-green-600 text-white transition duration-300 hover:-translate-y-1 active:translate-y-0 hover:bg-green-700/70">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-eraser-icon lucide-eraser"
              >
                <path
                  d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21"
                />
                <path d="m5.082 11.09 8.828 8.828" />
              </svg>
            </button>
          </div>
        </aside>
        <div>
          <canvas
            id="canvas"
            class="border bg-white" width="800" height="500"
          ></canvas>
        </div>
      </div>
      <footer class="w-full h-full border p-4 bg-zinc-200">
        <div class="w-full p-2">
          <input id="colorPicker" type="color" value="#000" />
          <input class="slcColor" type="color" value="#2e4643" />
          <input class="slcColor" type="color" value="#ff3333" />
          <input class="slcColor" type="color" value="#0000ff" />
          <input class="slcColor" type="color" value="#800080" />
        </div>
      </footer>
    </section>
  </body>
</html>
